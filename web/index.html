  <!-- 한글 폰트 preload: 첫 렌더 전에 브라우저가 미리 받아둠 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #E8DDD4; /* 앱 바깥 배경 (데스크탑에서 폰 옆 영역) */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* 모바일: 전체화면 */
    #flutter-app-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* 데스크탑(768px 이상): 폰 크기로 제한 */
    @media (min-width: 768px) {
      body {
        align-items: center;
        padding: 24px 0;
      }
      #flutter-app-container {
        width: 390px;
        height: 844px; /* iPhone 14 비율 */
        border-radius: 44px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.08);
        overflow: hidden;
      }
    }

    /* Flutter 캔버스가 컨테이너를 꽉 채우도록 */
    flt-glass-pane, flutter-view, flt-scene-host, canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
