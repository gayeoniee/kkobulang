name: Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Flutter SDK 설정 (stable 최신)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. 의존성 설치
      - name: Get dependencies
        run: flutter pub get

      # 4. API 키 파일 생성 (git에 없으므로 빌드 전에 자동 생성)
      - name: Create secrets.dart
        run: |
          mkdir -p lib/config
          echo "const String geminiApiKey = '${{ secrets.GEMINI_API_KEY }}';" > lib/config/secrets.dart

      # 5. 웹 빌드
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/"

      # 5. Cloudflare Pages 배포
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=kkobulang
